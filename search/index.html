    "body": "   Voronoi diagram for polygons  Voronoi diagram for polygons is a tool to create a Voronoi diagram also known as Thiessen polygons for polygons. It’s based on Shapely and GeoPandas. There are lots of tools to create a Voronoi diagram for points, for example Create Thiessen Polygons (Analysis) in ArcGIS Pro or ArcGIS Desktop, Voronoi Polygons in QGIS, or voronoi_diagram in Shapely. All of them are really cool. How about a Voronoi diagram for polygons? That’s what this tool does.     adaptive-curvefitting  Adaptive curvefitting is a tool to find potentially optimal models for your research data. It’s based on scipy, numpy, and matplotlib.     cscbank  Banks/ATMs near your place which works for CSC debit cards.     polygon(for test) "

    "body": "											Assessing sponge cities performance at city scale using remotely sensed LULC changes&#58; Case study Nanjing: 											📰 			Remote Sensing &nbsp; 			📅 							2021					 						As a result of high-density urbanization and climate change, both the frequency and intensity of extreme urban rainfall are increasing. Drainage systems are not designed to cope with this increase, and as a result, floods are becoming more common in cities, particularly in the rapidly growing cities of China. To… 🔗 Read more. . . 												Responses of storm-based soil erosion processes to land use changes in the upper Huaihe River basin, China: 											📰 			Environmental Earth Sciences &nbsp; 			📅 							2020					 						Better understanding the impacts of land use changes on storm-based sedigraphs in semi-humid and humid regions is critical for their soil erosion control. Based on the LULC, soil, precipitation, evaporation, flow and sediment data in the 1990 s to 2000 s from the Dapoling catchment of the upper Huaihe river… 🔗 Read more. . . 												Enhanced potential ecological risk induced by a large scale water diversion project: 											📰 			Stochastic Environmental Research and Risk Assessment &nbsp; 			📅 							2020					 						River regulation by the construction of reservoirs represents one of the greatest challenges to the natural flow regime and ecological health of riverine systems globally. The Danjiangkou (DJK) Reservoir is the largest reservoir on the Hangjiang River and commenced operations in 1967. The reservoir was upgraded in 2012 to provide… 🔗 Read more. . . 												Assessment of potential ecological risk due to hydrological flow regime modification in the Hanjiang River basin 1950-2017: 											📰 			EGU General Assembly Conference Abstracts &nbsp; 			📅 							2020					 						River regulation by the construction of reservoirs represents one of the greatest challenges to the natural hydrological regime and ecological health of riverine systems. The Danjiangkou (DJK) Reservoir is the largest reservoir on the Hangjiang River and started operation in 1967 and was upgraded in 2012 to provide water resource… 🔗 Read more. . . 												Responses of meteorological drought-hydrological drought propagation to watershed scales in the upper Huaihe River basin China: 											📰 			Environmental Science and Pollution Research &nbsp; 			📅 							2019					 						Spatial scale is a crucial factor in drought propagation and characterization. To investigate the response behavior of the meteorological drought-hydrological drought propagation to different watershed scales, three nested subbasins in the upper Huaihe River basin were selected as case study sites. The Standardized Precipitation Index and the Standardized Streamflow Index… 🔗 Read more. . . 												Potential impact of a large-scale cascade reservoir on the spawning conditions of critical species in the Yangtze River China: 											📰 			Water &nbsp; 			📅 							2019					 						Dam building and reservoir operations alter the downstream hydrological regime, and as a result, affect the health of the river aquatic ecosystem, particularly for large-scale cascade reservoirs. This study investigated the impact of the Gezhouba Reservoir (GR) and the Three Gorges Reservoir (TGR) on the spawning conditions of two critical… 🔗 Read more. . . 												Impacts of the Three Gorges Reservoir on its immediate downstream hydrological drought regime during 19502016: 											📰 			Natural Hazards &nbsp; 			📅 							2019					 						Impacts of the Three Gorges Reservoir (TGR) on the downstream hydrological extremes always draw public attentions, particularly during its (quasi) normal water storing period. To investigate the impact of the TGR on its downstream hydrological drought regime during different operation stages, Yichang and Cuntan stations were selected as the case… 🔗 Read more. . . 												Is the water level during dry season in Poyang Lake really lower than before: 											📰 			EGU general assembly conference abstracts &nbsp; 			📅 							2017					 						The Poyang Lake, the largest freshwater lake in China, has attracted world widely attentions in recent years due to it being dammed or not at the Lake’s outlet. It was reported that the Poyang Lake water levels have been declining significantly in dry seasons, which resulted in severe water supply,… 🔗 Read more. . . 												Quantifying the effect on flood regime of land-use pattern changes via hydrological simulation in the upper Huaihe River basin China: 											📰 			Natural Hazards &nbsp; 			📅 							2016					 						Both landscape and river systems over most regions of the world, within China in particular, have experienced unprecedented changes in the past decades, and their impacts from these changes undoubtedly have altered storm runoff generation characteristics and flood regimes in these areas. To assess the effect on flood regime of… 🔗 Read more. . . 												Potential evapotranspiration estimation in the upper Huaihe River basin China: 											📰 			Procedia Engineering &nbsp; 			📅 							2016					 						The atmospheric evaporative demand, one of principal components in water cycle, its accurate estimation is essential for hydrological simulation and forecasting. The purpose of this paper was to propose a plant-growth based dual-source potential evapotranspiration distributed model and investigate its feasibility with the upper Huaihe River basin (China) above the… 🔗 Read more. . . 												Hydrological drought forecasting and assessment based on the standardized stream index in the Southwest China: 											📰 			Procedia Engineering &nbsp; 			📅 							2016					 						Southwest China is abundant of rainfall and water resources, however, severe and extremely droughts hits it more frequently in recent years, caused huge loss of human lives and financial damages. To investigate the feasibility of the standardized stream index in Southwest China, the Nanpanjiang River basin above the Xiaolongtan hydrological… 🔗 Read more. . . 												Drought assessment by a short-long-term composited drought index in the upper Huaihe River basin China: 											📰 			Advances in Meteorology &nbsp; 			📅 							2016					 						Accurate and reliable drought monitoring is of primary importance for drought mitigation and reduction of social-ecological vulnerability. The aim of the paper was to propose a multiscale composited drought index (CDI) which could be widely used for drought monitoring and early warning in China. In the study, the upper Huaihe… 🔗 Read more. . . 												Investigation into impacts of land-use changes on floods in the upper Huaihe River basin China: 											📰 			Proceedings of the International Association of Hydrological Sciences &nbsp; 			📅 							2015					 						To investigate the agricultural land-use change on flood regime, the upper Huaihe River basin above the Dapoling station was selected as the case study site. Based on topography, land-use, hydrological and meteorological data in 1990s and 2010s, the improved distributed Xinanjiang model, with potential evapotranspiration being computed by coupling a… 🔗 Read more. . . 												Drought assessment using a multivariate drought index in the Huaihe River basin of Eastern China: 											📰 			Proceedings of the International Association of Hydrological Sciences &nbsp; 			📅 							2015					 						The Huaihe River Basin having China’s highest population density (662 persons per km2) lies in a transition zone between the climates of North and South China, and is thus prone to drought. Therefore, the paper aims to develop an appropriate drought assessment approach for drought assessment in the Huaihe River basin, China. Based on the Principal Component Analysis of precipitation, evapotranspiration, soil moisture and runoff, the three latter variables of which were obtained by use of the Xin’anjiang model, a new multivariate drought index (MDI) was formulated, and its thresholds were determined by use of cumulative distribution function. The MDI, the Standardized Precipitation Index (SPI) and the self-calibrating Palmer Drought Severity Index (sc-PDSI) time series on a monthly scale were computed and compared during 1988, 1999/2000 and 2001 drought events. The results show that the MDI exhibited certain advantages over the sc-PDSI and the SPI in monitoring drought evolution. The MDI formulated by this paper could provide a sci 🔗 Read more. . . 												Drought assessment using a multivariate drought index in the Luanhe River basin of Northern China: 											📰 			Stochastic environmental research and risk assessment &nbsp; 			📅 							2015					 						With climate change and the rapid increase in water demand, droughts, whose intensity, duration and frequency have shown an increasing trend in China over the past decades, are increasingly becoming a critical constraint to China’s sustainable socio-economic development, especially in Northern China, even more so. Therefore, it is essential to… 🔗 Read more. . . 												Drought assessment using a multivariate drought index in the Luanhe River basin of Northern China: 											📰 			Stochastic environmental research and risk assessment &nbsp; 			📅 							2015					 						With climate change and the rapid increase in water demand, droughts, whose intensity, duration and frequency have shown an increasing trend in China over the past decades, are increasingly becoming a critical constraint to China’s sustainable socio-economic development, especially in Northern China, even more so. Therefore, it is essential to… 🔗 Read more. . . 												Development and application of a short-long-term composited drought index in the upper Huaihe River basin China: 											📰 			Proceedings of the International Association of Hydrological Sciences &nbsp; 			📅 							2015					 						Accurate and reliable drought monitoring is of primary importance f ime in the Yangtze River, two of the largest reservoirs on the upper reach, i. e. ,… 🔗 Read more. . . 												Investigation into the impacts of land-use change on sediment yield characteristics in the upper Huaihe River basin China: 											📰 			Physics and Chemistry of the Earth, Parts A/B/C &nbsp; 			📅 							2012					 						The processes of sediment generation in the upper Huaihe River basin have been altered by the intensified human activities over the past decades, particularly land-use change. To investigate the impacts of land-use change on the sediment yield characteristics in the upper Huaihe River, the catchment above the Xixian hydrological controlling… 🔗 Read more. . . 												Impacts of Danjiangkou reservoir on sediment regime of the Hanjiang River: 											📰 			Hydrology Research &nbsp; 			📅 							2012					 						With population increase and economic growth, the development of water resources and hydropower resources of the Hanjiang River has been intensified by dam building, and consequently the sediment regime of the Hanjiang River has been altered to some extent. To assess dam-induced alterations in the sediment regime of the Hanjiang… 🔗 Read more. . . 												Impact of the Three Gorges reservoir operation on downstream ecological water requirements: 											📰 			Hydrology Research &nbsp; 			📅 							2012					 						With population increase and economic growth, the flow regime of the Yangtze River has been altered to some extent by human activities, particularly dam construction. Dam-induced alterations in the flow regime of the Yangtze River will unavoidably influence water allocation among different water users and instream ecological water requirements may… 🔗 Read more. . . 												Impacts of the Three Gorges-Gezhouba reservoir cascade on the stream temperature regime of the Yangtze River: 											📰 			IAHS-AISH publication &nbsp; 			📅 							2011					 						The Yangtze River (Changjiang) is the third largest river in the world, and the alterations in its hydrological regime have global-scale impacts. However, with population increase and economic growth, the stream temperature regime of the Yangtze River has been altered to some extent by human activities, particularly dam construction. The… 🔗 Read more. . . 												Impacts of the Gezhouba and Three Gorges reservoirs on the sediment regime in the Yangtze River China: 											📰 			Journal of Hydrology &nbsp; 			📅 							2011					 						The sediment regime of the Yangtze River (Changjiang) has been altered by intensified human activities over the past decades, particularly dam construction. To investigate the impacts of dam building on the sediment regime in the Yangtze River, two of the largest reservoirs on the upper reach, i. e. the Gezhouba reservoir… 🔗 Read more. . . 												Impacts of Three Gorges-Gezhouba reservoir cascade on the heat flux regime of the Yangtze River: 											📰 			Concept. Model. Stud. Integr. Groundw. Surf. Water Ecol. Syst &nbsp; 			📅 							2011					 						With population increase and economic growth, the thermal regime of the Yangtze River has been altered to some extent by human activities, particularly dam construction. To assess dam-induced alterations in the thermal regime of the Yangtze River quantitatively, this paper selected two key hydrological stations (Yichang and Cuntan stations) below… 🔗 Read more. . . 												Genetic algorithms based hydropower optimization of the Three Gorges reservoir operation under two reservoir storing water schemes: 											📰 			IAHS-AISH publication &nbsp; 			📅 							2011					 						Reservoir-induced alterations in the flow regime of the Yangtze River will unavoidably influence water allocation among different water uses, and as a result, how to optimize reservoir operation to maximize electricity generation is of significance by consideration of different water uses, and this frequently complicates water management decisions. This paper… 🔗 Read more. . . 												Spatial-temporal variations of evapotranspiration in the upper Huaihe River basin: 											📰 			International Symposium on Spatial Analysis, Spatial-Temporal Data Modeling, and Data Mining &nbsp; 			📅 							2009					 						Evapotranspiration, which is an important component of water cycle, is a critical variable in determination of local water resources available. This paper selected the upper Huaihe River as case study site. The daily reference evapotranspiration was computed by the Penman-Monteith method, and then the mean annual reference evapotranspiration (ETref), the… 🔗 Read more. . . 												Impact of human activities on the flow regime of the Hanjiang: 											📰 			Proceedings Symposium JS. 3 at the Joint Convention of the International Association of Hydrological Sciences (IAHS) and the International Associaiton of Hydrogeologists (IAH) &nbsp; 			📅 							2009					 						The Hanjiang River is the longest tributary of the Yangtze River. With the development of water resources, the flow regime of the Hanjiang River has been altered by dam building to some extent, and consequently water allocation water allocation Subject Category: Miscellaneoussee more details between different water uses may be… 🔗 Read more. . . 		"

    "url": "https://longlovemyu.tk/appimage_wsl/",
    "title": "How to run an AppImage on WSL",
    "body": "2021/03/19 - Generally, an AppImage will work well on Linux. So how about a Windows Subsystem for Linux (WSL)? Not sure. Here is a way to solve my error. Here was my error: fuse: device not found, try 'modprobe fuse' firstCannot mount AppImage, please check your FUSE setup. I solved it as follows: Step1: install Linux GUI Apps on Windows. :  Xming X Server for Windows VcXsrv Windows X ServerStep2: install GTK graphical user interface library (libgtk2. 0-0 or libgtk-3-0) in wsl: sudo apt-get install libgtk2. 0-0 sudo apt-get install libgtk-3-0 libgtk2. 0-0 is an old version, and libgtk-3-0 is the new version. While both works in the new release of ubuntu. More about GTK GUI library. Step3: set the default display in wsl. : export DISPLAY=:0 Default display number is 0. You can change it in Xlaunch. Of course, you can add it to your . bashrc or . zshrc file. Add followings to it. export DISPLAY= :0  Step4: navigate to your AppImage folder. Dinamica is my case. : cd /mnt/d/dinamicaEGO/v5 Step5: set access mode of AppImage file: chmod a+x Dinamica. AppImage a – all users x – permission to execute the file More about chmod. Step6: extract AppImage. : . /Dinamica. AppImage --appimage-extract Due to windows not support FUSE, AppImage have to be extracted and it will generate a folder named ‘squashfs-root’. Step7: Run it: . /squashfs-root/AppRun Although it works finally, I don’t think it is the way. Reference: Run AppImage on Windows How to run an AppImage using the Terminal Running GUI Linux applications in WSL 2 Running WSL GUI Apps on Windows 10"

    "url": "https://longlovemyu.tk/debugging-in-python/",
    "title": "Debugging in Python",
    "body": "2021/03/08 - pdb - the Python Debugger:    Invoke [pbd] from terminal to debug the entire script.   python -m pdb mytest. py      Insert import pdb; pdb. set_trace() in a specific line of the script.     Insert breakpoint() in the script. The built-in breakpoint() is a equivalent way of import pdb; pdb. set_trace().     Commands: c(ontinue), s(tep), n(ext), r(eturn), j(ump), q(uit) . . more.  PuDB - a console-based visual debugger for Python: Installing: Install PuDB by pip install pudb or conda install -c conda-forge pudb. Usage: Similar to pdb,    Debug the entire script with:   pudb mytest. py    or   python -m pudb mytest. py      Insert in a specific line with:   from pudb import set_trace; set_trace()    or   import pudb; pu. db      Integrate pudb with breakpoint() function. Add:   export PYTHONBREAKPOINT= pudb. set_trace     in your . bashrc or . zshrc. Then use breakpoint() in your script.     Commands: tyep ‘?’ in the console to check the conmand list.  References:  pdb — The Python Debugger Getting Started: pudb 2020. 1 dicumentation Python 3. 7’s new builtin breakpoint — a quick tour"

    "body": "2020/08/07 - This is a templete to show how to write a post. How to test a blog using bundle:   Navigate to path of the githubpages repository.   cd D:\git\githubPages\longavailable. github. io      Execute the following command:   bundle exec jekyll serve    or with --drafts tag.   bundle exec jekyll serve --drafts      Check the githubpages website from http://127. 0. 0. 1:4000.     Ctrl + C quit the bundle serve.  Markdown skillsSpace, tab, and blank line:    Paragraph: text line + blank line + text line     Plain code block: paragraph text line (+ blank line) + 1 Tab or 4 spaces + code + blank line     Plain code block in list (indented): (blank line) + ‘1 Tab + 2 spaces’ or 6 spaces + code (+ blank line)   Hello, world in list      Fenced code block: (blank line) + ` ` ` + language identifier + enter + code + enter + ` ` ` (+ blank line)  ## Header line h2.    Fenced code block in list (indented): (blank line) + 1 Tab or 4 spaces + ` ` ` + language identifier + enter + code + enter + 1 Tab or 4 spaces + ` ` ` (+ blank line). It didnot work for &lt;img&gt;, see here 2nd item. Why?   ### Header line h3.       More than 1 space in a text snippet (non-breaking space): &amp;nbsp; is 2 spaces, &amp;nbsp;&amp;nbsp; 4 spaces     Zero-width space: &amp;#8203;  How to add a picture: The picture from the repository which the site belongs to:    Just the picture   ![Pic01](/assets/pics/pic01_green_test. png)         A picture with defined position and size  &lt;div align= center &gt;&lt;img width= 165  height= 75  src= /assets/pics/pic01_green_test. png /&gt;&lt;/div&gt;The picture from internet:    Just the picture   ![Pic01](https://raw. githubusercontent. com/mzlogin/mzlogin. github. io/master/images/posts/markdown/demo. png)         A picture with defined position and size  &lt;div align= center &gt;&lt;img width= 65  height= 75  alt= Demo pic for test  src= https://raw. githubusercontent. com/mzlogin/mzlogin. github. io/master/images/posts/markdown/demo. png /&gt;&lt;/div&gt;How to compare two pictures: There are ways to create a comparative iframe. For example, How TO - Image Comparison Slider, JuxtaposeJS. Add the following to your post by using JuxtaposeJS. &lt;div class= juxtapose &gt;  &lt;img src= /assets/pics/img_forest. jpg  /&gt;  &lt;img src= /assets/pics/img_snow. jpg  /&gt;&lt;/div&gt;&lt;script src= https://cdn. knightlab. com/libs/juxtapose/latest/js/juxtapose. min. js &gt;&lt;/script&gt;&lt;link rel= stylesheet  href= https://cdn. knightlab. com/libs/juxtapose/latest/css/juxtapose. css &gt;    How to embed a map: a own map - geoJSON map:    Place the following in any HTML page that supports javascript:   &lt;script src= https://embed. github. com/view/geojson/&lt;username&gt;/&lt;repo&gt;/&lt;ref&gt;/&lt;path_to_file&gt; &gt;&lt;/script&gt;      Set height and weight, default 420px (h) x 620px (w)   &lt;script src= https://embed. github. com/view/geojson/&lt;username&gt;/&lt;repo&gt;/&lt;ref&gt;/&lt;path_to_file&gt;?width=&lt;width&gt;&amp;height=&lt;height&gt; &gt;&lt;/script&gt;      Example        a 3rd party map - google map:  Tutorial to get the embed link of a google map or directions       how to assign a variable: Assigning a variable in Github Markdown: { % assign variableTest =  This is a string variable.   % }{ % capture variableTest2 % }This is a string variable for syntax 2. { % endcapture % } Note that, there is no space between curly bracket {, } and percent sign %. The content of variableTest is “ This is a string variable. “. The content of variableTest2 is “ This is a string variable for syntax 2. “. The​content test. How to add a emoji 🙈   The easiest way is copy and paste   Visit Emojipedia, search , copy, and paste.     Use Jemoji   gem install jemoji    Add gem 'jemoji' to gemfile.   Add it as a plugin in _config. yml.   Note: It may cause other problem. For my site, it will confict with lunr. js.  add a reveal. js presentation&lt;iframe frameborder= no  border= 0  marginwidth= 0  marginheight= 0  width=500 height=400 src= /slides/2020-08-07-demo-from-revealjs. html#/ &gt;&lt;/iframe&gt;Press F to fullscreen mode. Reference Basic syntax - Markdown guide markdown-guide MathJax in Markdown Equation Editor Jekyll: Previous And Next Posts Jekyll without plugins Basic syntax - Liquid template language Emojipedia How TO - Image Comparison Slider JuxtaposeJS - Easy-to-make frame comparisons List of Badges, in Markdown"

    "body": "2020/07/26 - Voronoi diagram for polygons is a tool to create a Voronoi diagram also known as Thiessen polygons for polygons. It’s based on Shapely and GeoPandas. There are lots of tools to create a Voronoi diagram for points, for example Create Thiessen Polygons (Analysis) in ArcGIS Pro or ArcGIS Desktop, Voronoi Polygons in QGIS, or voronoi_diagram in Shapely. All of them are really cool. How about a Voronoi diagram for polygons? That’s what this tool does.  Voronoi diagram for polygons is a tool to create a Voronoi diagram also known as Thiessen polygons for polygons. It’s based on Shapely and GeoPandas. There are lots of tools to create a Voronoi diagram for points, for example Create Thiessen Polygons (Analysis) in ArcGIS Pro or ArcGIS Desktop, Voronoi Polygons in QGIS, or voronoi_diagram in Shapely. All of them are really cool. How about a Voronoi diagram for polygons? That’s what this tool does.  Table of contents:  Installation, update and uninstallation     Dependencies   To install   To update   To uninstall    Known shortages How to cite? ChangelogInstallation, update and uninstallation: Dependencies: It’s based on voronoi_diagram from Shapely which is new in version 1. 8. dev0. As of today, it is still a deveoping version. (2020-07-26) You can install or upgrade to the latest version by using: pip install git+https://github. com/Toblerity/Shapelypip install --upgrade git+https://github. com/Toblerity/ShapelyTo install: Quick installation with [pip]: pip install voronoi-diagram-for-polygonsOr from github: pip install git+https://github. com/longavailable/voronoi-diagram-for-polygonsAlso, you can just copy related functions from “[/longsgis/longsgis. py]” to your work. To update: pip install --upgrade voronoi-diagram-for-polygonsTo uninstall: pip uninstall voronoi-diagram-for-polygonsKnown shortages:  It may produce some polygons (unconnected polygons) around the boundary. How to cite: If this tool is useful to your research, star and cite it     "url": "https://longlovemyu.tk/dissolve_and_union/",
    "title": "Differences between dissolve and union in geoproceesing",
    "body": "2020/07/20 - When geometris intersect, how to union them? And if they aren’t intersected, how would these tools work? Commonly used geographic vector objects include three levels: featureCollection, feature, and geometry. dissolve and union will be compared in the context of geometry. dissolveAggregates some geometris into one geometry.  It works on one object, eg feature or geometryCollection. The latter is a list of geometris and it may be one of multipolygon, multilines, and points.  If two geometris touch, they will be unioned as one geometry.  If two geometris untouch, they will be gathered to one multi-object geometry. Considering the sole input, nothing will change for a geometryCollection.  Due to only one geometry for each feature, it is used to dissolve a multigemotry feature or geometryCollection coverted from multi features.  A similar operation in ArcGIS, Edit -&gt; Select the features to merge -&gt; merge. It may produce a unioned feature or a multigeometry feature.  unary-union in shapely have the same function. unionComputes a geometric union of the input geometris.  It works on at leat two objects.  If two input geometris touch, they will be unioned as one geometry.  If two input geometris untouch, they will be gathered to one multi-object geometry. Two untoched geomtry objects has merged to one multigeometry object.  A similar operation in ArcGIS, Edit -&gt; Select the features to merge -&gt; merge. It may produce a unioned feature or a multigeometry feature.  Note that union of analysis tool box in ArcGIS won’t create a unioned geometry for thoese touched each other. It will put all in one and split them by bounds.  union in shapely have the same function.  At end, we can say, dissolve or unary-union combines the sub-objects for a given geometryCollection object. union works for two independent objects. The outputs of them are very similar. bufferGoogle Earth Engine:  If two geometris touched, they will be unioned as one geometry after ee. Geometry. buffer operation. GeoPandas:  The number of geometris returen by GeoSeries. buffer() remains the same as input object. Reference Union (analysis) in ArcGIS Dissolve (Data Management) in ArcGIS Aggregation with dissolve - GeoPandas Merging features in the same layer - ArcGIS union - shapely unary-union - shapely GeoSeries. buffer()"

    "body": "2020/07/10 - How to load/embed a page from a html file in Jekyll post. This is the way. Self-held html file   Place it into _includes.     Add the following Liquid code to where you want to post contents of the html.   { % include load_html_test. html % }    load_html_test. html is the filename for the test html.     View the output.  html held by 3rd-partyThis is a tutial - How TO - Include HTML from W3Schools.    Prepare the HTML you want to include. A html file named myu_hhu_cn. html held on Github in my case.     Place the following javascript into your page.   &lt;script&gt; function includeHTML() {   var z, i, elmnt, file, xhttp;   /*loop through a collection of all HTML elements:*/   z = document. getElementsByTagName( * );   for (i = 0; i &lt; z. length; i++) {     elmnt = z[i];     /*search for elements with a certain atrribute:*/     file = elmnt. getAttribute( w3-include-html );     if (file) {       /*make an HTTP request using the attribute value as the file name:*/       xhttp = new XMLHttpRequest();       xhttp. onreadystatechange = function() {         if (this. readyState == 4) {           if (this. status == 200) {elmnt. innerHTML = this. responseText;}           if (this. status == 404) {elmnt. innerHTML =  Page not found.  ;}           /*remove the attribute, and call this function once more:*/           elmnt. removeAttribute( w3-include-html );           includeHTML();         }       }          xhttp. open( GET , file, true);       xhttp. send();       /*exit the function:*/       return;     }   } };&lt;/script&gt;      Include the HTML by using a w3-include-html attribute.  &lt;div w3-include-html= https://raw. githubusercontent. com/longlovemyu/profile/master/myu_hhu_cn. html &gt;&lt;/div&gt;   Call javascript function includeHTML() at the bottom of the page.   &lt;script&gt;includeHTML();&lt;/script&gt;      View the output.  Reference How TO - Include HTML"

    "url": "https://longlovemyu.tk/curvefitting/",
    "title": "First release of adaptive-curvefitting",
    "body": "2020/06/14 - When you have data and model, it’s easy to make a curvefitting. But when you face somedata new and you don’t have idea which model suit to it. Then this tool may be what you are looking for.  Adaptive curvefitting is a tool to find potentially optimal models for your research data. It’s based on scipy, numpy, and matplotlib. Table of contents:  Why is this tool? Installation, update and uninstallation     To install   To update   To uninstall    Usage     Import the required module   Do the curvefitting   Generate a expected model   Re-use the fitted curve    Shortages How to cite? ChangelogWhy is this tool: The very difference of adaptive-curvefitting with numpy. polyfit, scipy. optimize. curve_fit or scipy. optimize. least_squares is the hypothesis you don’t know which model to fit. If you already have the expected model, the methods in scipy and numpy are fantastic tools and better than this one. When you explore something unknown, this will be a maybe. Installation, update and uninstallation: To install: Quick installation with pip: pip install adaptive-curvefittingTo update: pip install --upgrade adaptive-curvefittingTo uninstall: pip uninstall adaptive-curvefittingUsage: Import the required module: In general, import longscurvefittingor import the specified function: from longscurvefitting import oneClickCurveFittingfrom longscurvefitting import generateFunctionfrom longscurvefitting import generateModelsDo the curvefitting: oneClickCurveFitting(xdata, ydata)There are some optional arguments of oneClickCurveFitting.  functions: specified or all (default) basic models(name of models) to fit.      Type: list of string   Default: basicModels_nameList    piecewise: if consider custom a piecewise function. It is mandatory not to ‘piecewise’ when the data size is less than 20.      Type: bool   Default: False    operator: operatation between basic models.      Type: string   Default: ‘+’    maxCombination: max number of combination of basic models.      Type: integer   Default: 2    plot_opt: the number of plot for optimal models.      Type: integer   Default: 10    xscale: one of {“linear”, “log”, “symlog”, “logit”, …}     Type: string   Default: None    yscale: one of {“linear”, “log”, “symlog”, “logit”, …}     Type: string   Default: None    filename_startwith: a custom string mark as part of output filename     Type: string   Default: ‘curvefit’    silent: minimal output to monitor     Type: boolean   Default: False    feedback: if True, return the optimal model(function object), parameters     Type: boolean   Default: False    kwargs: keyword arguments passed to curve_fit_m. Note that bounds and p0 will take no effect when multi-models.      Type: dict   See the complete example “/tests/curvefitting. py”. Generate a expected model: Create a model composited by gaussian and erf function: funcs = ['gaussian','erf']myfunc = generateFunction(funcs, functionName='myfunc', operator='+')['model']See the complete example “/tests/custom_a_model. py”. Re-use the fitted curve: See the complete example “/tests/reuse_the_fitted_model. py”. Shortages:  Based on scipy. optimize. least_squares, it cannot enhance the estimate of specified model. Evenmore, it has more limit than scipy. optimize. least_squares. For example, arguments of bounds, x0 or p0 were not supported due to the basic hypothesis. How to cite: If this tool is useful to your research, star and cite it as below: Xiaolong Liu, &amp; Meixiu Yu. (2020, June 14). longavailable/adaptive-curvefitting (Version v0. 1. 0). Zenodo. http://doi. org/10. 5281/zenodo. 3893596Easily, you can import it to Mendeley. "

antastic blog to guide the usage of XPath. Click here And you can test a XPath in Chrome Console. F12 –&gt; Console –&gt; Type your XPath like $x(“. //*[@id='id']”) –&gt; ENTER. Cases   submit the daily report to server, see source code.     require cookies from Google Earth Engine, see source code.  Reference Selenium Selenium - github Selenium python API List of Chromium Command Line Switches XPath in Selenium WebDriver: Complete Tutorial"

    "body": "2020/05/11 - How to use docker, follow these commands. Docker commands      Docker commands/命令   Explanation in Chinese/中文解释         docker info   查看整个docker系统信息       docker login -u &lt;username&gt; -p &lt;password&gt;   登陆docker hub       image的查询、新建、删除 					|           docker images   显示所有的image       docker rmi &lt;image ID&gt;   删除一个image       docker build &lt;. . . . . . &gt;   从Dockerfile新建一个image       docker search &lt;keywords&gt;   从ducker hub搜索image       docker pull &lt;image/repository name&gt;   从ducker hub上下载并在本地新建一个image/repository，类似git clone       docker commit &lt;existing-container&gt; &lt;hub-user&gt;/&lt;repo-name&gt;[:&lt;tag&gt;]   从Container新建或更新一个本地image       docker push &lt;hub-user&gt;/&lt;repo-name&gt;:&lt;tag&gt;   将本地image/repository提交给docker hub       container的查询、新建、删除 				 |           docker ps   显示正在运行的(running)container       docker container ls   同上，显示正在运行的(running)container       docker ps -a   显示所有container，包括正在运行的(running)，停止运行的(stop)       docker container ls -a   同上，显示所有container，包括正在运行的(running)，停止运行的(stop)       docker ps -a -f status=exited   显示停止运行的(stop)container, f是筛选filter命令       docker ps -aq   显示所有的container，但只显示ID       docker rm &lt;container ID/name&gt;   删除一个或多个container       docker container rm &lt;container ID/name&gt;   同上，删除一个或多个container       docker rm 'docker ps -aq -f status=exited'   删除所有不在运行的（stopped）container（在win10 cmd中多次尝试未成功）       docker container prune   同上，删除所有不在运行的（stopped）container       docker create &lt;container ID/name&gt;   新建一个container       docker run -it &lt;image&gt;   新建一个container（是否进入命令模式由image预设命令决定，ubuntu image latest可进入）       docker run -it --name &lt;new container name&gt; &lt;image&gt;   新建一个container，并对其命名       docker run -it --mount type=bind,source=&lt;local directory to be mounted&gt;,target=/&lt;&gt; &lt;image&gt;   挂载本地文件（只能在新建container时），[更多信息](https://docs. docker. com/storage/bind-mounts/)       docker start &lt;container ID/name&gt;   启动一个container（后台运行）       docker stop &lt;container ID/name&gt;   停止运行一个container（后台停止）       docker exec -it &lt;container ID/name&gt; /bin/zsh   进入一个正在运行的container的zsh命令模式       docker exec -it &lt;container ID/name&gt; /bin/bash   进入一个正在运行的container的bash命令模式       exit   退出container命令模式       docker rename &lt;container ID/name&gt; &lt;new name&gt;   在新建（run或create）未对container命名时，系统会自动生成名字，如要进入，则每次得查container id，rename命令可以将container name改成自己期望的名字   "

    "body": "2020/03/26 - Upload a file to github repository, and request it. Yes, it is normal. This blog make it more smoothly. Create, update and delete a fileYou can do all of them via Contents API.    get_contents in API v3, PyGithub   Python script as follows:   from github import Githubg = Github(). get_user()g. get_repo(repoName). get_contents(filePath)    Here the filePath can be a path for file or directory. For a file, it will has its encoded content with encoding and content keywords. For a directory, it will return a list-like object contents all infomations of the files or subdirectories except content.   Responce examples of GitHub API v3:   The root directory of cscbank: https://api. github. com/repos/longavailable/cscbank/contents.   README. md of cscbank: https://api. github. com/repos/longavailable/cscbank/contents/README. md.   Important❗          It can be used for a directory and a file.           This API has an upper limit of 1,000 files for a directory. If you need to retrieve more files, use the Git Trees API.           This API supports files up to 1 megabyte in size.           type for a directory is dir, and for a file is file.        Suggestion:   If you do NOT want to access content of a file, then donot get_contents for a file. That is, content is the special of this way. In addition, 1MB seems a little small. My idea is using get_contents for a directory to request sha and download_url keywords, then use requests. get(). Git Blobs API is another solution.     create_file in API v3, PyGithub   Python script as follows:   g. get_repo(repoName). create_file(path=file,message= 'update '+file,content= dataBase64)      update_file in API v3, PyGithub   Python script as follows:   g. get_repo(repoName). update_file(path=file,message= 'update '+file,content= dataBase64,sha=sha)    Notice: update_file need sha parameter, you have to request sha before use it.  Git Trees API and Git Blobs API   get a tree in API v3, PyGithub   If a directory has more than 1,000 files or you want to get the content of a over-1MB-while-below-100MB file directly using Git Blobs API.   Responce examples of GitHub API v3:   The root tree/directory of cscbank: https://api. github. com/repos/longavailable/cscbank/git/trees/master.   Subtree/subdirectory nl/delft of cscbank: https://api. github. com/repos/longavailable/cscbank/git/trees/master:nl/delft.   Notices:          sha is needed to use get_git_tree using PyGithub. Actually, treePath/directory likes master:nl/delft works as well.           type for a directory is tree, and for a file is blob.          get a blob in API v3, PyGithub   Notices:          sha is needed to use get_git_blob using PyGithub.           This API supports blobs/files up to 100 megabytes in size.       Reference GitHub API v3 PyGithub"

    "body": "2020/02/25 - Here is a simple way to create a landuse map. Step1: download landcover classification data: There are lots of good quality landcover products, likes GlobeLand30. Step2: extract the area you are interested in: ArcToolBox -&gt; Spactial Analyst Tools -&gt; Extraction -&gt; Extract by Mask Step3: reclassify to reach the landuse: ArcToolBox -&gt; Spactial Analyst Tools -&gt; Reclass -&gt; Reclassify Step4: summarize area of same type: For a relative small area, the grid will be regarded as same cell size. In other words, every grid has same cell area. Then the sum of each type is the cell area multiplied by the count. Select the target layer -&gt; Open Attribute Table -&gt; Add Field -&gt; Set Name and Type as needed -&gt; Right-click at the new field -&gt; Field Calculator -&gt; Tyep [Count] * 300 * 300 (300 is the cell side length) Note the coordinate system. In my opinion, it’s better to set as a local projected coordinate system. "

    "body": "2020/02/12 - How to connect another desktop remotely? The easiest wayIn my experience, the easiest way is to use a third-party tool. TeamViewer can work from Windows, Mac, Linux, Android, iOS, etc.  Windows built-in Remote Desktop ConnectionConnect a desktop in LAN (local area network):  Enable Remote Desktop Connection on the host computer (which you want to connect or access remotely).  Launch Remote Desktop Connection utility on the client computer.  Connect to the host computer. If in LAN, enter the computer name. Connect a desktop in WAN (wide area network):  Enable Remote Desktop Connection on the host computer (which you want to connect or access remotely).  Forward TCP port 3389 to IP address of the host computer in router.  Launch Remote Desktop Connection utility on the client computer.  Connect to the host computer. Enter the public IP followed with the port number. Notice: Microsoft has a Remote Desktop app to support accessing a desktop from Android and iOS.  Reference: Setup a Remote Desktop Connection for LAN/WAN Access How To Allow Remote Desktop Connections From Outside Your Home Or Office Network"

    "title": "General concepts of matplotlib",
    "body": "2020/02/11 - What is figure, axes and axis in matplotlib? Check the introduction of general concepts firstly. Some concepts of a figure: Figure VS axes: Figure: The whole figure. The figure keeps track of all the child Axes, a smattering of ‘special’ artists (titles, figure legends, etc), and the canvas. A figure can have any number of Axes, but to be useful should have at least one. A figure is everything in a final plot. Axes: This is what you think of as ‘a plot’, it is the region of the image with the data space. A given figure can contain many Axes, but a given Axes object can only be in one Figure. The Axes contains two (or three in the case of 3D) Axis objects (be aware of the difference between Axes and Axis) which take care of the data limits (the data limits can also be controlled via set via the set_xlim() and set_ylim() Axes methods). Each Axes has a title (set via set_title()), an x-label (set via set_xlabel()), and a y-label set via set_ylabel()). A axes concludes two (or three) axis, a x-label, a y-label, a title and the space surrounded by them. Axes VS axis: Axes: Axis: These are the number-line-like objects. They take care of setting the graph limits and generating the ticks (the marks on the axis) and ticklabels (strings labeling the ticks). The location of the ticks is determined by a Locator object and the ticklabel strings are formatted by a Formatter. The combination of the correct Locator and Formatter gives very fine control over the tick locations and labels. SpinesA axis concludes spines, ticks and ticklabels.  Reference: Matplotlib - User’s Guide - Tutorials - Usage Guide Writing mathematical expressions"

    "body": "2020/01/14 - When you want to use a font when plotting using matplotlib in python, it returns ‘not found’. The answer maybe here. How to set different font when plotting with matplotlib in python? Set locally, for example set font for title:   tfont = {'fontname':'Times New Roman'} plt. title('title',**tfont)    Set globally:   import matplotlib. pyplot as plt plt. rcParams['font. family'] = 'Times New Roman'    If it works fine, that’s ok. If it return something like the following:    findfont: Font family ['. . . . . '] not found. Falling back to DejaVu Sans.     Then continue.  Check first: Precautiously check matplotlib font cache or let it go:   cd ~/. cache/matplotlib &amp;&amp; ls    There may have a json file as the matplotlib font cache file. Check if the expected font exists.       If the font exists, this is NOT for you and you can STOP here.    If not, continue.     Check if the expected font exists in the system:   fc-list : family | sort    or    fc-list -f '%{file}\n' | sort    or    fc-list : lang=zh    or    fc-list :lang=zh -f  %{family}\n  | sort | uniq    If needed, install fontconfig first.      If the font exists, go here.    If not, go here.    How to install a font in Linux Require preferred font. NOTICE truetype format (. ttc/. ttf) Copy it to the fonts directory   cp &lt;font path&gt; /usr/share/fonts/&lt;somewhere&gt;   Update the font cache in Linux re-generate font cache:   sudo fc-cache -fv    If needed, install fontconfig first.  Remove current matplotlib font cache Precautiously backup first:   cp -r ~/. cache/matplotlib &lt;somewhere&gt;    Remove it:   rm -fr ~/. cache/matplotlib   Re-run the plotting scriptNormally, the matplotlib font cache will re-generate automatically. That’s it.  Reference: How to change fonts in matplotlib (python)? matplotlib. pyplot other parameters - Other keyword arguments Won’t use a font although it can be found by the FontManager Add custom fonts to Matplotlib"

    "body": "2019/09/18 - 场地海绵方案如何设计？一步一个脚印即可。 1. 确定设计目标（建设要求），即径流总量控制率是多少，对应的设计降雨是多少。 2. 场地分析，计算海绵设施实施前（常规设计条件下）的径流量V0（也即需要通过增加海绵设施控制的水量）。这一步可以通过swmm等模拟模拟计算，或者径流系数法估算。 3. 海绵设计，即设置海绵设施，重点在于设施选择的合理性与竖向合理性。 4. 评估分析，计算海绵设施的有效控制容积量  Ve ，再与 V0进行对比，若 Ve &gt; V0 即满足设计目标。如果用swmm等模型评估，若不产生径流，即表明方案满足设计要求。 蓝绿设计的目标是尽量使人为开发不改变原自然水文条件。因此为了避免设计目标设置不合理（过高），可进行自然状况（即未开发状况时）场地自然径流量 Vn ​，若 Vn ​&gt;0，则设计目标可能偏高。 兼有空间功能与艺术之美则更需千锤百炼，方有可能得之。 "

function lunr_search(term) {
    document.getElementById('lunrsearchresults').innerHTML = '<ul></ul>';
    if(term) {
        document.getElementById('lunrsearchresults').innerHTML = "<p>Search results for '" + term + "'</p>" + document.getElementById('lunrsearchresults').innerHTML;
        //put results on the screen.
        var results = idx.search(term);
        if(results.length>0){
            //console.log(idx.search(term));
            //if results
            for (var i = 0; i < results.length; i++) {
                // more statements
                var ref = results[i]['ref'];
                var url = documents[ref]['url'];
                var title = documents[ref]['title'];
                var body = documents[ref]['body'].substring(0,160)+'...';
                document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML = document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML + "<li class='lunrsearchresult'><a href='" + url + "'><span class='title'>" + title + "</span><br /><span class='body'>"+ body +"</span><br /><span class='url'>"+ url +"</span></a></li>";
            }
        } else {
            document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML = "<li class='lunrsearchresult'>No results found...</li>";
        }
    }
    return false;
}
